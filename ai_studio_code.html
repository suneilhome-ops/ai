<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>貓狗大戰 - 網頁格鬥遊戲</title>
    <style>
        body { margin: 0; background: #2c3e50; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; font-family: 'Microsoft JhengHei', sans-serif; }
        #gameContainer { position: relative; border: 8px solid #ecf0f1; border-radius: 15px; overflow: hidden; box-shadow: 0 0 50px rgba(0,0,0,0.5); }
        canvas { background: #87CEEB; display: block; } /* 天藍色背景 */
        
        .ui { position: absolute; top: 20px; width: 100%; display: flex; justify-content: space-around; pointer-events: none; }
        .health-bar-container { width: 350px; height: 35px; background: #c0392b; border: 3px solid #fff; border-radius: 20px; overflow: hidden; }
        .health-fill { width: 100%; height: 100%; background: linear-gradient(to right, #2ecc71, #27ae60); transition: width 0.3s; }
        .label { color: white; font-size: 24px; font-weight: bold; margin-bottom: 5px; text-shadow: 2px 2px 5px #000; }

        #overlay { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; width: 100%; }
        #msg { color: white; font-size: 100px; font-weight: bold; text-shadow: 5px 5px 20px rgba(0,0,0,0.8); margin: 0; display: none; }
        
        #restartBtn {
            margin-top: 20px; padding: 20px 50px; font-size: 30px; cursor: pointer;
            background: #f1c40f; border: none; border-radius: 50px; font-weight: bold;
            box-shadow: 0 5px 0 #d35400; transition: 0.1s; display: none;
        }
        #restartBtn:active { transform: translateY(5px); box-shadow: none; }

        .instructions { position: absolute; bottom: 20px; color: #fff; text-align: center; width: 100%; font-size: 18px; text-shadow: 1px 1px 2px #000; }
        .key { background: #fff; color: #000; padding: 2px 8px; border-radius: 5px; font-weight: bold; }
    </style>
</head>
<body>

<div id="gameContainer">
    <div class="ui">
        <div>
            <div class="label">玩家 🐱</div>
            <div class="health-bar-container"><div id="playerHealth" class="health-fill"></div></div>
        </div>
        <div>
            <div class="label" style="text-align: right;">電腦 🐶</div>
            <div class="health-bar-container"><div id="enemyHealth" class="health-fill"></div></div>
        </div>
    </div>

    <div id="overlay">
        <p id="msg"></p>
        <button id="restartBtn" onclick="restartGame()">再戰一場！</button>
    </div>

    <canvas id="gameCanvas"></canvas>
    <div class="instructions">
        移動: <span class="key">W</span> <span class="key">A</span> <span class="key">D</span> | 
        攻擊: <span class="key">←</span> 向左打 <span class="key">→</span> 向右打
    </div>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const msgDisplay = document.getElementById('msg');
const restartBtn = document.getElementById('restartBtn');

canvas.width = 1024;
canvas.height = 576;

const gravity = 0.8;
let animationId;
let isGameOver = false;

class Character {
    constructor({ position, velocity, emoji, isAI = false }) {
        this.position = position;
        this.velocity = velocity;
        this.width = 100;
        this.height = 100;
        this.emoji = emoji;
        this.health = 100;
        this.isAI = isAI;
        this.isAttacking = false;
        this.attackDir = 1; // 1 為右, -1 為左
        this.attackFrame = 0;
        this.hitFlicker = 0;
        this.jumpAngle = 0;
    }

    draw() {
        ctx.save();
        ctx.translate(this.position.x + this.width/2, this.position.y + this.height/2);
        
        // 跳躍時旋轉
        if (this.velocity.y !== 0) {
            this.jumpAngle += (this.velocity.x > 0 ? 0.1 : -0.1);
            ctx.rotate(this.jumpAngle);
        } else {
            this.jumpAngle = 0;
        }

        // 受傷閃爍
        if (this.hitFlicker > 0) {
            ctx.globalAlpha = 0.5;
            ctx.scale(1.2, 0.8);
            this.hitFlicker--;
        }

        // 畫角色 (Emoji)
        ctx.font = "80px Arial";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText(this.emoji, 0, 0);

        // 畫攻擊動畫 (肉球 🐾)
        if (this.isAttacking) {
            ctx.font = "50px Arial";
            let attackX = this.attackDir * (60 + this.attackFrame * 5);
            ctx.fillText("🐾", attackX, 0);
            this.attackFrame++;
            if (this.attackFrame > 10) {
                this.isAttacking = false;
                this.attackFrame = 0;
            }
        }

        ctx.restore();
    }

    update() {
        this.draw();
        
        this.position.x += this.velocity.x;
        this.position.y += this.velocity.y;

        // 地面偵測
        if (this.position.y + this.height + this.velocity.y >= canvas.height - 20) {
            this.velocity.y = 0;
            this.position.y = canvas.height - 20 - this.height;
        } else {
            this.velocity.y += gravity;
        }

        // 邊界限制
        if (this.position.x < 0) this.position.x = 0;
        if (this.position.x + this.width > canvas.width) this.position.x = canvas.width - this.width;
    }

    attack(direction) {
        if (this.isAttacking) return;
        this.isAttacking = true;
        this.attackDir = (direction === 'left' ? -1 : 1);
        this.attackFrame = 0;
    }
}

const player = new Character({
    position: { x: 150, y: 0 },
    velocity: { x: 0, y: 0 },
    emoji: "🐱"
});

const enemy = new Character({
    position: { x: 800, y: 0 },
    velocity: { x: 0, y: 0 },
    emoji: "🐶",
    isAI: true
});

const keys = {
    a: { pressed: false },
    d: { pressed: false }
};

// 碰撞偵測 (包含攻擊方向判定)
function checkCollision() {
    // 玩家打電腦
    if (player.isAttacking && player.attackFrame < 5) {
        let hitRangeX = player.position.x + (player.attackDir === 1 ? player.width : -player.width);
        if (
            hitRangeX + 50 > enemy.position.x &&
            hitRangeX < enemy.position.x + enemy.width &&
            player.position.y + player.height > enemy.position.y &&
            player.position.y < enemy.position.y + enemy.height
        ) {
            enemy.health -= 5;
            enemy.hitFlicker = 10;
            document.getElementById('enemyHealth').style.width = enemy.health + '%';
        }
    }

    // 電腦打玩家
    if (enemy.isAttacking && enemy.attackFrame < 5) {
        let hitRangeX = enemy.position.x + (enemy.attackDir === 1 ? enemy.width : -enemy.width);
        if (
            hitRangeX + 50 > player.position.x &&
            hitRangeX < player.position.x + player.width &&
            enemy.position.y + enemy.height > player.position.y &&
            enemy.position.y < player.position.y + player.height
        ) {
            player.health -= 5;
            player.hitFlicker = 10;
            document.getElementById('playerHealth').style.width = player.health + '%';
        }
    }
}

function handleAI() {
    const dist = player.position.x - enemy.position.x;
    // AI 移動
    if (Math.abs(dist) > 80) {
        enemy.velocity.x = dist > 0 ? 3 : -3;
    } else {
        enemy.velocity.x = 0;
        // AI 攻擊判定
        if (Math.random() < 0.05) {
            enemy.attack(dist > 0 ? 'right' : 'left');
        }
    }
    // AI 跳躍
    if (Math.random() < 0.01 && enemy.velocity.y === 0) enemy.velocity.y = -18;
}

function animate() {
    if (isGameOver) return;
    animationId = window.requestAnimationFrame(animate);

    // 繪製背景 (草地與天空)
    ctx.fillStyle = '#87CEEB';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = '#2ecc71';
    ctx.fillRect(0, canvas.height - 20, canvas.width, 20);

    player.update();
    enemy.update();

    player.velocity.x = 0;
    if (keys.a.pressed) player.velocity.x = -6;
    if (keys.d.pressed) player.velocity.x = 6;

    handleAI();
    checkCollision();

    if (player.health <= 0 || enemy.health <= 0) {
        isGameOver = true;
        msgDisplay.style.display = "block";
        restartBtn.style.display = "inline-block";
        if (player.health <= 0) {
            msgDisplay.innerText = "你輸了！🐶 贏了";
            msgDisplay.style.color = "#ff4d4d";
        } else {
            msgDisplay.innerText = "太棒了！🐱 獲勝";
            msgDisplay.style.color = "#2ecc71";
        }
    }
}

function restartGame() {
    isGameOver = false;
    player.health = 100;
    enemy.health = 100;
    player.position = { x: 150, y: 0 };
    enemy.position = { x: 800, y: 0 };
    document.getElementById('playerHealth').style.width = '100%';
    document.getElementById('enemyHealth').style.width = '100%';
    msgDisplay.style.display = "none";
    restartBtn.style.display = "none";
    animate();
}

window.addEventListener('keydown', (e) => {
    if (isGameOver) return;
    switch (e.key) {
        case 'a': case 'A': keys.a.pressed = true; break;
        case 'd': case 'D': keys.d.pressed = true; break;
        case 'w': case 'W': if (player.velocity.y === 0) player.velocity.y = -20; break;
        // 箭頭鍵攻擊
        case 'ArrowLeft': player.attack('left'); break;
        case 'ArrowRight': player.attack('right'); break;
    }
});

window.addEventListener('keyup', (e) => {
    switch (e.key) {
        case 'a': case 'A': keys.a.pressed = false; break;
        case 'd': case 'D': keys.d.pressed = false; break;
    }
});

animate();
</script>
</body>
</html>
